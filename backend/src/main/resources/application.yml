#    username: guest
#    password: guest
#    virtual-host: /

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*.xml

springdoc:
  packages-to-scan: com.foodordering.controller
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    urls-primary-name: 0.全部接口
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
    default-models-expand-depth: 1
    doc-expansion: list

logging:
  level:
    com.foodordering: info

app:
  order:
    auto-start-cooking-enabled: ${ORDER_AUTO_START_COOKING_ENABLED:true}
    auto-start-cooking-delay-seconds: ${ORDER_AUTO_START_COOKING_DELAY_SECONDS:300}
    auto-start-cooking-scan-interval-ms: ${ORDER_AUTO_START_COOKING_SCAN_INTERVAL_MS:15000}
  auth:
    admin:
      jwt-secret: ${ADMIN_JWT_SECRET:food-ordering-admin-jwt-secret-change-me-2026}
      token-ttl-seconds: ${ADMIN_JWT_TTL_SECONDS:43200}
    client:
      jwt-secret: ${CLIENT_JWT_SECRET:food-ordering-client-jwt-secret-change-me-2026}
      token-ttl-seconds: ${CLIENT_JWT_TTL_SECONDS:2592000}
      allow-dev-fallback: ${CLIENT_AUTH_ALLOW_DEV_FALLBACK:true}
  wechat:
    app-id: ${WECHAT_APP_ID:}
    app-secret: ${WECHAT_APP_SECRET:}
    mock-login-enabled: ${WECHAT_MOCK_LOGIN_ENABLED:true}
  pay:
    wechat:
      mode: ${WECHAT_PAY_MODE:mock}
      mch-id: ${WECHAT_PAY_MCH_ID:}
      merchant-serial-no: ${WECHAT_PAY_CERT_SERIAL_NO:}
      private-key-path: ${WECHAT_PAY_PRIVATE_KEY_PATH:}
      api-v3-key: ${WECHAT_PAY_API_V3_KEY:}
      notify-url: ${WECHAT_PAY_NOTIFY_URL:}
      platform-public-key-path: ${WECHAT_PAY_PLATFORM_PUBLIC_KEY_PATH:}
      platform-serial-no: ${WECHAT_PAY_PLATFORM_SERIAL_NO:}
