server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/food_ordering?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:password}
    hikari:
      maximum-pool-size: ${MYSQL_MAX_POOL_SIZE:20}
      minimum-idle: ${MYSQL_MIN_IDLE:5}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  h2:
    console:
      enabled: false
  sql:
    init:
      mode: ${SQL_INIT_MODE:never}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*.xml

logging:
  level:
    com.foodordering: info

app:
  auth:
    admin:
      jwt-secret: ${ADMIN_JWT_SECRET}
      token-ttl-seconds: ${ADMIN_JWT_TTL_SECONDS:43200}
    client:
      jwt-secret: ${CLIENT_JWT_SECRET}
      token-ttl-seconds: ${CLIENT_JWT_TTL_SECONDS:2592000}
      allow-dev-fallback: false
  wechat:
    app-id: ${WECHAT_APP_ID}
    app-secret: ${WECHAT_APP_SECRET}
    mock-login-enabled: false
  pay:
    wechat:
      mode: real
      mch-id: ${WECHAT_PAY_MCH_ID}
      merchant-serial-no: ${WECHAT_PAY_CERT_SERIAL_NO}
      private-key-path: ${WECHAT_PAY_PRIVATE_KEY_PATH}
      api-v3-key: ${WECHAT_PAY_API_V3_KEY}
      notify-url: ${WECHAT_PAY_NOTIFY_URL}
      platform-public-key-path: ${WECHAT_PAY_PLATFORM_PUBLIC_KEY_PATH}
      platform-serial-no: ${WECHAT_PAY_PLATFORM_SERIAL_NO:}
