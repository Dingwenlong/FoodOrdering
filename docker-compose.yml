services:
  mysql:
    image: mysql:8.0
    container_name: food_ordering_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: food_ordering
    ports:
      - "127.0.0.1:23306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:6.2
    container_name: food_ordering_redis
    ports:
      - "127.0.0.1:26379:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: food_ordering_rabbitmq
    ports:
      - "127.0.0.1:25672:5672"
      - "127.0.0.1:25673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
